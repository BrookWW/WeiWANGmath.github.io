<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Wei Wang's academic profile, research, teaching, talks, and notes.">
    <title>Wei Wang - Academic Profile</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1f5fbf',
                        secondary: '#2f7dd1',
                        accent: '#0f766e',
                        light: '#eef6ff',
                        bgDark: '#111827',
                        cardDark: '#1f2937'
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif']
                    }
                }
            }
        };
    </script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="assets/css/site.css" rel="stylesheet">

    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>
    <header id="navbar" class="fixed w-full bg-white/95 dark:bg-bgDark/95 backdrop-blur-md z-50 border-b border-gray-100 dark:border-gray-800">
        <div class="section-inner">
            <div class="flex justify-between items-center h-16">
                <a class="nav-logo shrink-0 text-xl font-bold text-primary no-underline" href="#home" data-page="home-page">Wei Wang</a>

                <div class="flex items-center space-x-1 md:space-x-4 flex-1 justify-end">
                    <div class="relative max-w-xs w-full group ml-4">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa fa-search text-gray-400 group-focus-within:text-primary transition-colors"></i>
                        </div>
                        <input
                            type="text"
                            id="global-search"
                            class="block w-full pl-10 pr-3 py-1.5 border border-gray-200 dark:border-gray-700 rounded-full bg-gray-50 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm"
                            placeholder="Search"
                            autocomplete="off"
                        >
                        <div id="search-results"></div>
                    </div>

                    <nav class="hidden lg:flex space-x-1" aria-label="Main navigation">
                        <a class="nav-link active" href="#home" data-page="home-page">Home</a>
                        <a class="nav-link" href="#research" data-page="research-page">Research</a>
                        <a class="nav-link" href="#teaching" data-page="teaching-page">Teaching</a>
                        <a class="nav-link" href="#talks" data-page="talks-page">Talks</a>
                        <a class="nav-link" href="#notes" data-page="notes-page">Notes</a>
                    </nav>

                    <div class="flex items-center border-l dark:border-gray-800 pl-2">
                        <button id="theme-toggle" class="icon-button" aria-label="Toggle dark mode">
                            <i id="theme-icon" class="fa fa-moon-o text-lg"></i>
                        </button>
                        <button id="menu-toggle" class="icon-button lg:hidden ml-1" aria-label="Toggle menu">
                            <i class="fa fa-bars text-xl"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <nav id="mobile-menu" class="hidden lg:hidden bg-white dark:bg-bgDark border-t dark:border-gray-800 px-4 py-4 space-y-2" aria-label="Mobile navigation">
            <a class="nav-link active block" href="#home" data-page="home-page">Home</a>
            <a class="nav-link block" href="#research" data-page="research-page">Research</a>
            <a class="nav-link block" href="#teaching" data-page="teaching-page">Teaching</a>
            <a class="nav-link block" href="#talks" data-page="talks-page">Talks</a>
            <a class="nav-link block" href="#notes" data-page="notes-page">Notes</a>
        </nav>
    </header>

    <div id="page-container">
        <div class="section-inner py-24 text-center text-gray-500">Loading...</div>
    </div>

    <footer class="mt-20 py-12 border-t border-gray-100 dark:border-gray-800 text-center">
        <p class="text-sm text-gray-500">&copy; 2026 Wei Wang. All rights reserved.</p>
    </footer>

    <script src="assets/js/site.js" defer></script>
</body>
</html>
